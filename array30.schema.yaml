# array30.scheme.yaml
# vim: set sw=2 sts=2 et:
# encoding: utf-8

schema:
  schema_id: array30
  name: "иЎҢеҲ—30"
  version: "2.0"
  author:
    - зҷјжҳҺдәә е»–жҳҺеҫ·е…Ҳз”ҹ
    - Jiehong Ma <ma.jiehong@gmail.com>
    - Terry Tsang <archerindigo@gmail.com>
  description: |
    иЎҢеҲ—30ијёе…Ҙжі•
    http://www.array.com.tw/
  dependencies:
    - array30_wsymbols
    - luna_quanpin

switches:
  - name: ascii_mode
    reset: 0
    states: [ дёӯж–Ү, иҘҝж–Ү ]
  - name: full_shape
    states: [ еҚҠи§’, е…Ёи§’ ]
  - name: simplification
    states: [ жјўеӯ—, жұүеӯ— ]
  - name: extended_charset
    states: [ еёёз”Ё, еўһе»Ј ]
  - name: ascii_punct
    states: [ гҖӮпјҢ, пјҺпјҢ ]
  - name: emoji_suggestion
    states: [ "рҹҲҡпёҸ", "рҹҲ¶пёҸ" ]

menu:
  page_size: 10

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@wsymbols
    - affix_segmentor@array30_query                 # "?"иҗ¬з”Ёеӯ—е…ғз”Ё
    - affix_segmentor@luna_pinyin                   # еҸҚжҹҘжӢјйҹіз”Ё
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator
    - table_translator@wsymbols
    - table_translator@array30_query                # "?"иҗ¬з”Ёеӯ—е…ғз”Ё
    - punct_translator
    - script_translator@luna_pinyin                 # еҸҚжҹҘжӢјйҹіз”Ё
  filters:
    - simplifier
    - simplifier@emoji_suggestion
    - uniquifier
    - reverse_lookup_filter@reverse_lookup_array30      # еҸҚжҹҘ

array30_format:
    - 'xform|^A$|рҹҷӮ|'   # Smileys & Emotion
    - 'xform|^S$|рҹ§‘|'   # People & Body
    - 'xform|^D$|рҹҗ•|'   # Animals & Nature
    - 'xform|^F$|рҹҚҙ|'   # Food & Drink
    - 'xform|^G$|вңҲ|'   # Travel & Places
    - 'xform|^H$|вҡҪ|'   # Activities
    - 'xform|^J$|рҹ’Ў|'   # Objects
    - 'xform|^K$|рҹ”Ј|'   # Symbols
    - 'xform|^L$|рҹҸҙ|'   # Flags
    - 'xform|v|4v|'
    - 'xform|q|1вҶ‘|'
    - 'xform|w|2вҶ‘|'
    - 'xform|e|3вҶ‘|'
    - 'xform|r|4вҶ‘|'
    - 'xform|t|5вҶ‘|'
    - 'xform|y|6вҶ‘|'
    - 'xform|u|7вҶ‘|'
    - 'xform|i|8вҶ‘|'
    - 'xform|o|9вҶ‘|'
    - 'xform|p|0вҶ‘|'
    - 'xform|a|1вҖҗ|'
    - 'xform|s|2вҖҗ|'
    - 'xform|d|3вҖҗ|'
    - 'xform|f|4вҖҗ|'
    - 'xform|g|5вҖҗ|'
    - 'xform|h|6вҖҗ|'
    - 'xform|j|7вҖҗ|'
    - 'xform|k|8вҖҗ|'
    - 'xform|l|9вҖҗ|'
    - 'xform|;|0вҖҗ|'
    - 'xform|z|1вҶ“|'
    - 'xform|x|2вҶ“|'
    - 'xform|c|3вҶ“|'
    - 'xform|b|5вҶ“|'
    - 'xform|n|6вҶ“|'
    - 'xform|m|7вҶ“|'
    - 'xform|,|8вҶ“|'
    - 'xform|\.|9вҶ“|'
    - 'xform|/|0вҶ“|'
    - 'xform|~| |'      # ж¶ҲйҷӨйҖҗйҚөжҸҗзӨәеүҚз¶ҙ'~'

speller:
  alphabet: "abcdefghjiklmnopqrstuvwxyz;,./?'ABCDEFGHIJKLMNOPQRSTUVWXYZ"
  delimiter: "\\"
  algebra:
    - xform/^(.*)!$/$1/                 # з°Ўзўј
    - xform/^(.*)@$/$1/                 # зү№еҲҘзўјпјҲй ҲзҪ®ж–јз°Ўзўјд№ӢеҫҢпјү

translator:
  dictionary: array30
  enable_charset_filter: true
  enable_user_dict: false    # з”ЁжҲ¶и©һе…ёгҖӮдё»иҰҒз”Ёж–јиӘҝй »
  enable_completion: true   # й җиЁӯе•ҹеӢ•йҖҗйҚөжҸҗзӨәпјҢз…§йЎ§emojiијёе…Ҙ
  disable_user_dict_for_patterns:
    - "^[^ASDFGHJKL].?$"  # е–®зўјеҸҠйӣҷзўјдёҚиӘҝй »пјҢд»ҘдҝқжҢҒз°ЎзўјдҪҚзҪ®гҖӮEmojiдҫӢеӨ–
  preedit_format:
    __include: array30_format
  comment_format:
    __include: array30_format

wsymbols:
  tag: wsymbols
  dictionary: array30_wsymbols
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false
  preedit_format:
    - 'xform|^w1$|жЁҷй»һз¬Ұиҷҹ|'
    - 'xform|^w2$|жӢ¬иҷҹз¬Ұиҷҹ|'
    - 'xform|^w3$|дёҖиҲ¬з¬Ұиҷҹ|'
    - 'xform|^w4$|ж•ёеӯёз¬Ұиҷҹ|'
    - 'xform|^w5$|ж–№еҗ‘з¬Ұиҷҹ|'
    - 'xform|^w6$|е–®дҪҚз¬Ұиҷҹ|'
    - 'xform|^w7$|ең–иЎЁз¬Ұиҷҹ|'
    - 'xform|^w8$|й ҶеәҸз¬Ұиҷҹ|'
    - 'xform|^w9$|еёҢиҮҳз¬Ұиҷҹ|'
    - 'xform|^w0$|жіЁйҹіз¬Ұиҷҹ|'

array30_query:
  tag: array30_query
  dictionary: array30_query
  enable_charset_filter: true
  enable_completion: true
  preedit_format:
    __include: array30_format
  comment_format:
    __include: array30_format

emoji_suggestion:
  opencc_config: emoji.json
  option_name: emoji_suggestion
  tips: all

# еҸҚжҹҘжӢјйҹіз”Ёtranslator
luna_pinyin:
  tag: luna_pinyin
  dictionary: luna_pinyin
  prism: luna_quanpin
  prefix: "`"
  suffix: "\\"
  tips: гҖ”жӢјйҹігҖ•
  preedit_format:
    - xform/([nl])v/$1Гј/
    - xform/([nl])ue/$1Гјe/
    - xform/([jqxy])v/$1u/

# еҫһе…¶д»–ијёе…Ҙж–№жЎҲеҸҚжҹҘиЎҢеҲ—
reverse_lookup_array30:
  tags: [ luna_pinyin, array30_query ]
  overwrite_comment: true
  dictionary: array30
  comment_format:
    __include: array30_format
    __append:
      - 'xform| | ][ |'
      - 'xform|^(.)|[ $1|'
      - 'xform|(.)$|$1 ]|' #е°ҮжҜҸеҖӢеӯ—зўјд»Ҙ[ ]еҢ…дҪҸ

punctuator:
  import_preset: default

key_binder:
  import_preset: default
  bindings:
    - { when: paging, accept: comma, send: comma }
    - { when: has_menu, accept: period, send: period }

recognizer:
  patterns:
    wsymbols: "^[w][0-9]$"
    array30_query: "^.*[?]+[a-z;,.\/]*\\\\?$"
    luna_pinyin: "`[a-z]*\\\\?$"
    email: "^[a-z][-_.0-9a-z]*@.*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$"
